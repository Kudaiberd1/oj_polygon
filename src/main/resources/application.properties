spring.application.name=polygon

server.port=8000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database=postgresql

spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${ISSUER_URI}/protocol/openid-connect/certs

jwt.auth.converter.resource-id=${CLIENT_ID}
jwt.auth.converter.principle-attribute=preferred_username

spring.application.jwt.keycloak.uri=${ISSUER_URI}
spring.application.jwt.keycloak.url=${KEYCLOAK_URL}
spring.application.jwt.keycloak.client-id=${CLIENT_ID}
spring.application.jwt.keycloak.client-secret=${CLIENT_SECRET}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
spring.application.jwt.keycloak.realm=${REALM}

aws.s3.bucket-name=online-judge
seaweedfs.endpoint=${SEAWEEDFS_URL}

judge0.base-url=${JUDGE0_URL}