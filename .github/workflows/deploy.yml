name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build jar
        run: ./gradlew bootJar

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kudaiberd1/oj_polygon:latest
            ghcr.io/kudaiberd1/oj_polygon:${{ github.sha }}

      - name: Install Tailscale manually
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/focal.noarmor.gpg \
            | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/focal.tailscale-keyring.list \
            | sudo tee /etc/apt/sources.list.d/tailscale.list
          sudo apt-get update
          sudo apt-get install -y tailscale

      - name: Connect to Tailscale
        run: |
          sudo tailscaled &
          sleep 3
          sudo tailscale up \
            --login-server=https://headscale.ailab-sdu.com \
            --authkey=${{ secrets.TS_AUTH_KEY }} \
            --hostname=github-actions \
            --accept-routes
          sleep 5
          tailscale status

      - name: Deploy to G-Block VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GBLOCK_HOST }}
          username: ubuntu
          key: ${{ secrets.GBLOCK_SSH_KEY }}
          timeout: 60s
          script: |
            set -e

            echo "==> Pulling latest image..."
            docker pull ghcr.io/kudaiberd1/oj_polygon:latest

            echo "==> Stopping old container..."
            cd /opt/polygon
            docker compose down backend || true

            echo "==> Starting new container..."
            docker compose up -d backend

            echo "==> Waiting for startup..."
            sleep 30

            echo "==> Health check..."
            curl -sf http://localhost:8000/actuator/health \
              && echo "✅ Deploy successful!" \
              || (echo "❌ Health check failed!" && exit 1)