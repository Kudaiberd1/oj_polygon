name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kudaiberd1/oj_polygon:latest
            ghcr.io/kudaiberd1/oj_polygon:${{ github.sha }}

      - name: Deploy to G-Block VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GBLOCK_HOST }}
          username: ubuntu
          key: ${{ secrets.GBLOCK_SSH_KEY }}
          script: |
            set -e

            cd /opt/polygon

            echo "==> Pulling latest image..."
            docker pull ghcr.io/kudaiberd1/oj_polygon:latest

            echo "==> Restarting backend..."
            docker compose down backend || true
            docker compose up -d backend

            echo "==> Waiting for startup..."
            sleep 30

            echo "==> Health check..."
            curl -sf http://localhost:8000/actuator/health \
              && echo "Deploy successful!" \
              || (echo "Health check failed!" && exit 1)
